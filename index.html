
<!DOCTYPE html>
<html lang="en">
  <head>
     <style>
      body{
      background-color: rgb(29, 29, 29);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
      margin: 0;
      
      }

      @import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=IBM+Plex+Sans+Thai+Looped:wght@100;200;300;400;500;600;700&family=Niramit:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Sarabun:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&family=Taviraj:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
      h1 {
      color: var(--text-color);
      font-family: 'Sarabun', sans-serif;
      font-weight: 700;
      text-align: center;
      margin-bottom: 50px;
      }

      .video-container{
      border: 3px solid var(--text-color);
      padding: 15px;
      border-radius: 10px;
      position: relative;
      display: inline-block;
      }

      @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=IBM+Plex+Sans+Thai+Looped:wght@100;200;300;400;500;600;700&family=Niramit:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Noto+Serif+Thai:wght@100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Sarabun:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800&family=Taviraj:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
      p {
      color: var(--text-color);
      font-family: 'Sarabun', static;
      font-weight: 400;
      text-align: center;
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      padding: 0 15px;
      background-color: var(--bg-color);
      font-size: 1.1rem;
      }
      
      :root {
      --bg-color: rgb(29, 29, 29);
      --text-color: rgb(220, 220, 220);
      }

      iframe{
      max-width: 100%;
      border-radius: 5px;
      }

      video{
      width: 600px;
      max-width: 100%;
      height: auto;
      border-radius: 5px;
      display: block;
      }
     </style>

  <meta charset="UTF-8">
  <title>Fish blood vessels</title>

  </head>
  <body>
    <h1>Fish blood vessels</h1>

    <div class="video-container">
        <p>คลิปวิดีโอ</p>
        <video controls>
        <source src="Lung 1.mp4" type="video/mp4">
        </video>
    </div>
  </body>
</html>
